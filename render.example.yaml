# Example Render Blueprint — do not enable Blueprint sync unless you want a new service.
# For a Web Service in the Render dashboard, match these (see DEPLOYMENT.md → Render):
#   Root Directory: backend
#   Build Command:  npm install && npm run build
#   Start Command:  npx knex migrate:latest && npm start
# `npm run build` runs build:webapps (grace-to-grace-web + frontend) so Express can serve them.

services:
  - type: web
    name: clientforge-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npx knex migrate:latest && npm start
    healthCheckPath: /health
