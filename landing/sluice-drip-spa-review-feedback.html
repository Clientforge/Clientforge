<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Tell Sluice Drip Spa how we can improve your experience.">
  <title>Your feedback — Sluice Drip Spa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f3f7f8;
      --paper: #fcfdfd;
      --ink: #1a2428;
      --muted: #5a656b;
      --accent: #2a6b7a;
      --accent-dark: #1a4d5c;
      --gold: #ffd700;
      --gold-light: #fff4a8;
      --gold-mid: #ffd700;
      --gold-dark: #b8860b;
      --line: #dce6ea;
      --radius: 16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 17px;
      line-height: 1.55;
      color: var(--ink);
      background: var(--bg);
      min-height: 100vh;
      padding: 32px 22px 48px;
    }
    .card {
      max-width: 560px;
      margin: 0 auto;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 32px 28px 36px;
      box-shadow: 0 20px 48px rgba(26, 36, 40, 0.07);
    }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.75rem;
      margin-bottom: 8px;
      text-align: center;
    }
    .stars-display {
      text-align: center;
      font-size: clamp(2.5rem, 10vw, 4rem);
      letter-spacing: 0.15em;
      margin: 16px 0 20px;
      line-height: 1;
      background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold-mid) 40%, #e6b800 75%, var(--gold-dark) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 2px 6px rgba(184, 134, 11, 0.45));
    }
    .meta {
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 8px;
    }
    textarea {
      width: 100%;
      min-height: 160px;
      padding: 14px 16px;
      border: 1.5px solid var(--line);
      border-radius: 10px;
      font-family: inherit;
      font-size: 1rem;
      resize: vertical;
      margin-bottom: 20px;
    }
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(42, 107, 122, 0.18);
    }
    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 999px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff;
      transition: filter 0.15s ease;
    }
    .btn:hover { filter: brightness(1.05); }
    .back {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .back a { color: var(--accent-dark); font-weight: 600; }
    .thank { display: none; text-align: center; padding: 20px 0; }
    .thank h2 { font-family: 'Playfair Display', serif; margin-bottom: 8px; }
  </style>
</head>
<body>

  <div class="card" id="form-panel">
    <h1>We’re sorry we missed the mark</h1>
    <div class="stars-display" id="stars-display" aria-hidden="true"></div>
    <p class="meta" id="rating-line"></p>
    <p class="meta">Your notes go directly to our team so we can make it right.</p>

    <form id="feedback-form">
      <label for="message">What could we do better?</label>
      <textarea id="message" name="message" required placeholder="Share as much detail as you’re comfortable with…"></textarea>
      <button type="submit" class="btn">Send feedback</button>
    </form>
    <p class="back"><a href="/sluice-review">← Back to rating</a></p>
  </div>

  <div class="card thank" id="thank-panel">
    <h2>Thank you</h2>
    <p class="meta" style="margin-bottom:0">We read every message and take your experience seriously.</p>
    <p class="back"><a href="/sluice-review">← Back</a></p>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var stars = parseInt(params.get('stars'), 10);
      if (Number.isNaN(stars) || stars < 1 || stars > 3) stars = 1;
      document.getElementById('stars-display').textContent = '★'.repeat(stars) + '☆'.repeat(5 - stars);
      document.getElementById('rating-line').textContent = 'You chose ' + stars + ' out of 5 stars.';

      var FEEDBACK_EMAIL = 'info@sluicedripspa.com';

      document.getElementById('feedback-form').addEventListener('submit', function (e) {
        e.preventDefault();
        var msg = document.getElementById('message').value.trim();
        if (!msg) return;
        var subject = encodeURIComponent('Sluice Drip Spa feedback (' + stars + ' stars)');
        var body = encodeURIComponent('Rating: ' + stars + ' / 5 stars\n\n' + msg);
        window.location.href = 'mailto:' + FEEDBACK_EMAIL + '?subject=' + subject + '&body=' + body;
        document.getElementById('form-panel').style.display = 'none';
        document.getElementById('thank-panel').style.display = 'block';
      });
    })();
  </script>

</body>
</html>
